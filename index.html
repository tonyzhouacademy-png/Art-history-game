<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order of Jade and Stone | 玉与石的秩序</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505; --text: #8c9699; --jade: #7a9e7e;
      --bronze: #b8860b; --clay: #a67c52; --highlight: #dcdcdc;
      --tony: #7a9e7e; --wong: #b8860b; --bao: #a67c52;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: "Noto Serif SC", "Times New Roman", serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden; user-select: none;
    }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    .noise { opacity: 0.05; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1)); background-size: 100% 4px; }

    /* Phase indicator */
    #phase-indicator { position: fixed; top: 20px; left: 20px; z-index: 20; font-size: 0.65rem; letter-spacing: 3px; opacity: 0; transition: opacity 1s; color: var(--text); }
    #phase-indicator.visible { opacity: 0.35; }
    #phase-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--jade); margin-right: 8px; vertical-align: middle; }

    #wrap { width: 90%; max-width: 600px; text-align: center; position: relative; z-index: 10; }
    #stage { width: 160px; height: 160px; margin: 0 auto 30px; filter: drop-shadow(0 0 15px rgba(122,158,126,0.3)); transition: filter 1s; }
    #shape { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawPath 2s forwards ease-in-out; }
    @keyframes drawPath { to { stroke-dashoffset: 0; } }
    #text-area { min-height: 120px; margin-bottom: 20px; line-height: 1.9; font-size: 1.05rem; opacity: 0; }
    #text-area b { color: var(--highlight); font-weight: normal; border-bottom: 1px solid var(--jade); }
    #text-area i { color: var(--clay); }
    .btn-container { display: flex; flex-direction: column; gap: 10px; opacity: 0; }
    .btn { padding: 12px 16px; border: 1px solid #222; cursor: pointer; transition: all 0.4s; background: rgba(0,0,0,0.5); font-family: inherit; font-size: 0.95rem; color: var(--text); text-align: left; position: relative; overflow: hidden; }
    .btn:hover { border-color: var(--jade); color: var(--jade); padding-left: 20px; background: rgba(122,158,126,0.05); }
    .btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--jade); transition: 0.3s; }
    .btn:hover::before { width: 3px; }
    .hidden-item { font-size: 0.82rem; color: var(--clay); margin: 15px 0; opacity: 0; transition: opacity 0.8s; letter-spacing: 1px; }
    .hidden-item.visible { opacity: 1; }
    .oracle { font-size: 0.8rem; color: var(--jade); margin-top: 30px; opacity: 0; letter-spacing: 2px; transition: opacity 1.5s; }
    .oracle.visible { opacity: 0.7; }

    /* ── START SCREEN ─────────────────────────────────── */
    #start-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 100; transition: opacity 1s; }
    #start-screen h1 { font-weight: 300; letter-spacing: 6px; margin-bottom: 10px; font-size: 1.4rem; color: var(--highlight); }
    #start-screen .sub { opacity: 0.4; font-size: 0.85rem; margin-bottom: 8px; letter-spacing: 2px; }
    #start-screen p { opacity: 0.4; font-size: 0.8rem; animation: pulse 2s infinite; letter-spacing: 3px; margin-top: 30px; }

    /* ── NAME SCREEN ──────────────────────────────────── */
    #name-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.97);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 110; opacity: 0; pointer-events: none;
      transition: opacity 0.8s;
    }
    #name-screen.show { opacity: 1; pointer-events: all; }
    .name-box { text-align: center; max-width: 420px; width: 88%; }
    .name-prompt { font-size: 0.88rem; line-height: 1.9; color: var(--text); margin-bottom: 6px; }
    .name-prompt-zh { font-size: 0.82rem; color: #555; margin-bottom: 28px; letter-spacing: 1px; }
    .name-deco { width: 40px; height: 1px; background: var(--jade); margin: 0 auto 24px; opacity: 0.4; }
    #name-input {
      width: 100%; padding: 12px 16px; background: #0a0a0a;
      border: 1px solid #333; color: var(--highlight);
      font-family: inherit; font-size: 1.1rem; text-align: center;
      letter-spacing: 3px; outline: none; transition: border-color 0.3s;
    }
    #name-input:focus { border-color: var(--jade); }
    #name-input::placeholder { opacity: 0.3; letter-spacing: 1px; font-size: 0.85rem; }
    #name-submit {
      margin-top: 16px; padding: 11px 32px; border: 1px solid var(--jade);
      background: transparent; color: var(--jade); font-family: inherit;
      font-size: 0.8rem; letter-spacing: 3px; cursor: pointer; transition: 0.3s;
    }
    #name-submit:hover { background: rgba(122,158,126,0.1); }
    #name-skip { display: block; margin-top: 14px; font-size: 0.7rem; color: #333; cursor: pointer; letter-spacing: 1px; transition: color 0.3s; }
    #name-skip:hover { color: #555; }

    /* Language switch */
    #lang-switch { position: fixed; top: 20px; right: 20px; z-index: 20; cursor: pointer; font-size: 0.75rem; border: 1px solid #333; padding: 5px 10px; opacity: 0.4; transition: 0.3s; letter-spacing: 1px; }
    #lang-switch:hover { opacity: 1; border-color: var(--jade); }

    /* Inventory */
    .inventory { position: fixed; bottom: 20px; left: 20px; z-index: 20; display: flex; gap: 10px; align-items: center; }
    .inv-item { width: 26px; height: 26px; opacity: 0.15; transition: opacity 0.5s, filter 0.5s; }
    .inv-item.found { opacity: 1; filter: drop-shadow(0 0 6px var(--clay)); }

    /* ── OBSERVER PANEL ──────────────────────────────── */
    #observer-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(4,4,4,0.97); border-top: 1px solid #1a1a1a; z-index: 150; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.16,1,0.3,1); padding: 24px 28px 20px; max-height: 70vh; overflow-y: auto; }
    #observer-panel.visible { transform: translateY(0); }
    .observer-header { font-size: 0.65rem; letter-spacing: 3px; color: #333; margin-bottom: 20px; text-transform: uppercase; display: flex; justify-content: space-between; }
    .observer-entry { margin-bottom: 18px; padding-left: 12px; border-left: 2px solid #222; }
    .observer-name { font-size: 0.68rem; letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; }
    .observer-text { font-size: 0.88rem; line-height: 1.8; font-style: italic; }
    .entry-tony .observer-name { color: var(--tony); } .entry-tony .observer-text { color: #9ab89e; } .entry-tony { border-left-color: rgba(122,158,126,0.3); }
    .entry-wong .observer-name { color: var(--wong); } .entry-wong .observer-text { color: #c9a050; } .entry-wong { border-left-color: rgba(184,134,11,0.3); }
    .entry-bao  .observer-name { color: var(--bao);  } .entry-bao  .observer-text { color: #b8956c; } .entry-bao  { border-left-color: rgba(166,124,82,0.3); }
    #observer-continue { margin-top: 16px; padding: 10px 24px; border: 1px solid #333; background: transparent; color: var(--text); font-family: inherit; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.4s; float: right; }
    #observer-continue:hover { border-color: var(--jade); color: var(--jade); }

    /* ── SHARED MODAL BASE ───────────────────────────── */
    .npc-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.88); z-index: 210; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
    .npc-modal.show { opacity: 1; pointer-events: all; }
    .npc-modal-box { max-width: 520px; width: 90%; padding: 32px; border-radius: 2px; font-size: 0.9rem; color: #ccc; animation: fadeIn 0.5s forwards; position: relative; }
    .npc-modal-label { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; }
    .npc-modal-prompt { line-height: 1.9; margin-bottom: 20px; }
    .npc-modal-prompt b { font-weight: normal; border-bottom: 1px solid; }
    .npc-modal-prompt i { opacity: 0.7; font-style: italic; }
    .npc-modal textarea, .npc-modal input[type=text] { width: 100%; padding: 10px 14px; font-family: inherit; font-size: 0.88rem; outline: none; resize: none; background: rgba(0,0,0,0.7); color: var(--highlight); line-height: 1.6; border-radius: 1px; }
    .npc-modal-actions { display: flex; gap: 12px; margin-top: 14px; justify-content: flex-end; }
    .npc-submit-btn, .npc-skip-btn { padding: 9px 20px; border: 1px solid; background: transparent; font-family: inherit; font-size: 0.78rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
    .npc-skip-btn { border-color: #333; color: #555; } .npc-skip-btn:hover { color: #777; border-color: #555; }
    .char-count { font-size: 0.7rem; text-align: right; margin-top: 5px; opacity: 0.35; }

    /* Tony Li Modal */
    .tony-modal { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(4,4,4,0.96); border: 1px solid var(--bronze); padding: 28px; border-radius: 2px; z-index: 210; max-width: 500px; width: 88%; font-size: 0.9rem; color: #ccc; box-shadow: 0 0 30px rgba(184,134,11,0.2); display: none; }
    .tony-modal.show { display: block; animation: fadeIn 0.5s forwards; }
    .tony-modal-header { color: var(--bronze); font-size: 0.78rem; letter-spacing: 2px; margin-bottom: 16px; font-style: italic; }
    .tony-modal p { line-height: 1.9; margin-bottom: 12px; }
    .tony-modal b { color: var(--highlight); font-weight: normal; border-bottom: 1px solid var(--bronze); }
    .tony-modal i { color: var(--clay); }
    .input-area { margin-top: 18px; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 8px 12px; background: #111; border: 1px solid var(--jade); color: var(--highlight); font-family: inherit; font-size: 0.9rem; outline: none; }
    .input-area input:focus { border-color: var(--bronze); }
    .input-area button { padding: 8px 16px; background: transparent; border: 1px solid var(--jade); color: var(--jade); cursor: pointer; font-family: inherit; font-size: 0.85rem; transition: 0.3s; }
    .input-area button:hover { background: rgba(122,158,126,0.15); }
    .tony-skip { font-size: 0.72rem; color: #444; cursor: pointer; margin-top: 12px; display: block; text-align: right; transition: color 0.3s; }
    .tony-skip:hover { color: #666; }
    .tony-feedback { margin-top: 10px; font-size: 0.8rem; min-height: 18px; transition: color 0.3s; }
    .tony-feedback.correct { color: var(--jade); } .tony-feedback.wrong { color: #8b3a3a; }

    /* NPC modal accent styles */
    #bao-modal .npc-modal-box { background: rgba(8,5,2,0.98); border: 1px solid var(--bao); box-shadow: 0 0 30px rgba(166,124,82,0.15); }
    #bao-modal .npc-modal-label { color: var(--bao); }
    #bao-modal textarea, #bao-modal input[type=text] { border: 1px solid rgba(166,124,82,0.4); }
    #bao-modal input[type=text]:focus { border-color: var(--bao); }
    #bao-modal .npc-submit-btn { border-color: var(--bao); color: var(--bao); }
    #bao-modal .npc-submit-btn:hover { background: rgba(166,124,82,0.1); }
    .jade-preview { margin: 8px auto 16px; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; position: relative; }
    #bao-inscription-text { position: absolute; font-size: 0.68rem; color: var(--jade); letter-spacing: 1px; text-align: center; max-width: 55px; line-height: 1.4; word-break: break-all; }

    #wong-modal .npc-modal-box { background: rgba(5,4,0,0.98); border: 1px solid var(--bronze); box-shadow: 0 0 30px rgba(184,134,11,0.15); }
    #wong-modal .npc-modal-label { color: var(--bronze); }
    #wong-modal textarea { border: 1px solid rgba(184,134,11,0.4); }
    #wong-modal textarea:focus { border-color: var(--bronze); }
    #wong-modal .npc-submit-btn { border-color: var(--bronze); color: var(--bronze); }
    #wong-modal .npc-submit-btn:hover { background: rgba(184,134,11,0.08); }
    #wong-modal .aoem-grid { display: grid; grid-template-columns: 90px 1fr; gap: 6px 12px; margin-bottom: 14px; font-size: 0.78rem; }
    #wong-modal .aoem-key { color: var(--bronze); opacity: 0.7; letter-spacing: 1px; align-self: center; }
    #wong-modal .aoem-val { color: #999; font-style: italic; align-self: center; }

    #tony-q-modal .npc-modal-box { background: rgba(2,5,4,0.98); border: 1px solid var(--jade); box-shadow: 0 0 30px rgba(122,158,126,0.15); }
    #tony-q-modal .npc-modal-label { color: var(--jade); }
    #tony-q-modal textarea { border: 1px solid rgba(122,158,126,0.4); }
    #tony-q-modal textarea:focus { border-color: var(--jade); }
    #tony-q-modal .npc-submit-btn { border-color: var(--jade); color: var(--jade); }
    #tony-q-modal .npc-submit-btn:hover { background: rgba(122,158,126,0.08); }

    /* ── ENDING SCREEN ───────────────────────────────── */
    #ending-screen { display: none; text-align: center; }
    #ending-screen.show { display: block; animation: fadeIn 2s forwards; }
    .ending-title { font-size: 1.4rem; color: var(--highlight); letter-spacing: 4px; margin-bottom: 10px; font-weight: 300; }
    .ending-zh { font-size: 1.8rem; color: var(--jade); letter-spacing: 8px; margin-bottom: 20px; }
    .ending-desc { font-size: 0.9rem; line-height: 1.8; opacity: 0.7; margin-bottom: 30px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .ending-oracle { font-size: 0.75rem; color: var(--jade); letter-spacing: 2px; opacity: 0.6; margin-bottom: 30px; font-style: italic; }
    .score-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; font-size: 0.7rem; letter-spacing: 1px; opacity: 0.5; flex-wrap: wrap; }
    .score-item { text-align: center; }
    .score-bar { width: 40px; height: 3px; background: #222; margin: 4px auto 0; overflow: hidden; }
    .score-fill { height: 100%; background: var(--jade); transition: width 1.5s ease; }
    .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
    .restart-btn { padding: 10px 24px; border: 1px solid #333; background: transparent; color: var(--text); font-family: inherit; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: 0.4s; }
    .restart-btn:hover { border-color: var(--jade); color: var(--jade); }
    #next-chapter-btn { padding: 10px 24px; border: 1px solid var(--bronze); background: transparent; color: var(--bronze); font-family: inherit; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: 0.4s; }
    #next-chapter-btn:hover { background: rgba(184,134,11,0.08); }

    /* ── JADE RECORD CARD ───────────────────────────── */
    .jade-record-card {
      border: 1px solid rgba(122,158,126,0.2);
      padding: 24px 20px 20px;
      margin: 28px auto;
      max-width: 300px;
      text-align: center;
      position: relative;
      background: rgba(122,158,126,0.02);
    }
    .jade-record-card::before {
      content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
      border: 1px solid rgba(122,158,126,0.08); pointer-events: none;
    }
    .jrc-header { font-size: 0.58rem; letter-spacing: 4px; color: #333; text-transform: uppercase; margin-bottom: 16px; }
    .jrc-player-name { font-size: 1.1rem; color: var(--highlight); letter-spacing: 4px; margin-bottom: 14px; font-weight: 300; }
    .jrc-jade-wrap { position: relative; width: 90px; height: 90px; margin: 0 auto 14px; }
    .jrc-jade-svg { width: 90px; height: 90px; filter: drop-shadow(0 0 6px rgba(122,158,126,0.4)); }
    .jrc-inscription {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 0.62rem; color: var(--jade); letter-spacing: 1px;
      text-align: center; max-width: 60px; line-height: 1.5; word-break: break-all;
    }
    .jrc-civ { font-size: 0.72rem; letter-spacing: 2px; color: var(--jade); margin-bottom: 4px; text-transform: uppercase; }
    .jrc-civ-zh { font-size: 1rem; color: var(--jade); letter-spacing: 4px; margin-bottom: 0; }

    /* ── TESTIMONIES ─────────────────────────────────── */
    #testimonies { margin-top: 36px; padding-top: 28px; border-top: 1px solid #111; text-align: left; }
    .test-section-title { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #333; margin-bottom: 18px; }
    .testimony-entry { padding: 10px 14px; border-left: 2px solid #1a1a1a; font-size: 0.82rem; line-height: 1.7; margin-bottom: 10px; }
    .te-label { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .te-label.tony { color: var(--tony); } .te-label.wong { color: var(--wong); } .te-label.bao { color: var(--bao); }
    .te-value { color: #aaa; font-style: italic; }
    .te-value.jade-inscription { color: var(--jade); letter-spacing: 2px; font-style: normal; }
    .past-block { border: 1px solid #111; padding: 16px; margin-bottom: 16px; }
    .past-block-header { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .past-mini-jade { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
    .past-mini-jade svg { width: 48px; height: 48px; opacity: 0.7; }
    .past-mini-inscription { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.55rem; color: var(--jade); letter-spacing: 1px; text-align: center; max-width: 34px; word-break: break-all; line-height: 1.3; }
    .past-meta { font-size: 0.62rem; color: #444; }
    .past-meta-name { font-size: 0.82rem; color: #666; letter-spacing: 2px; margin-bottom: 4px; }
    .past-meta-civ { font-size: 0.65rem; color: var(--jade); letter-spacing: 1px; }
    .no-past { font-size: 0.78rem; color: #2a2a2a; font-style: italic; text-align: center; padding: 20px 0; }

    /* ── WARRING STATES TEASER ───────────────────────── */
    #wars-teaser { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 1.5s; }
    #wars-teaser.visible { opacity: 1; pointer-events: all; }
    .wars-era { font-size: 0.7rem; letter-spacing: 4px; color: #444; margin-bottom: 30px; }
    .wars-zh { font-size: 2.5rem; letter-spacing: 10px; color: var(--bronze); margin-bottom: 12px; font-weight: 300; }
    .wars-en { font-size: 0.85rem; letter-spacing: 3px; color: #888; margin-bottom: 24px; text-transform: uppercase; }
    .wars-subtitle { font-size: 0.75rem; color: #555; letter-spacing: 2px; margin-bottom: 40px; }
    .wars-quote { font-size: 1rem; color: #9a9690; line-height: 1.8; max-width: 420px; text-align: center; font-style: italic; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; padding: 20px 0; margin-bottom: 40px; }
    .wars-tease { font-size: 0.65rem; letter-spacing: 4px; color: #2a2a2a; animation: pulse 3s infinite; }
    #wars-back { margin-top: 40px; padding: 10px 24px; border: 1px solid #222; background: transparent; color: #444; font-family: inherit; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.4s; }
    #wars-back:hover { border-color: #666; color: #888; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100%{opacity:0.25;} 50%{opacity:0.6;} }
    @keyframes jadeGlow { 0%,100%{filter:drop-shadow(0 0 4px var(--jade));} 50%{filter:drop-shadow(0 0 12px var(--jade));} }
    .jade-glowing { animation: jadeGlow 1.5s ease-in-out infinite; }
  </style>
</head>
<body>

<div class="overlay noise"></div>
<div class="overlay scanlines"></div>
<div id="lang-switch">EN / 中文</div>

<div id="phase-indicator">
  <span id="phase-dot"></span>
  <span id="phase-text">NEOLITHIC</span>
</div>

<!-- Start Screen -->
<div id="start-screen">
  <h1>ORDER OF JADE &amp; STONE</h1>
  <div class="sub">玉与石的秩序</div>
  <p id="start-hint">CLICK TO ENTER THE RUINS</p>
</div>

<!-- Name Input Screen -->
<div id="name-screen">
  <div class="name-box">
    <div class="name-deco"></div>
    <div class="name-prompt" id="name-prompt">Before you enter the ruins, state your name.</div>
    <div class="name-prompt-zh" id="name-prompt-zh">在进入遗迹之前，请说出你的名字。</div>
    <input type="text" id="name-input" maxlength="20" autocomplete="off" spellcheck="false" />
    <button id="name-submit" id="name-submit-btn"></button>
    <span id="name-skip"></span>
  </div>
</div>

<div id="wrap">
  <div id="main-game">
    <svg id="stage" viewBox="0 0 100 100">
      <path id="shape" d="" fill="none" stroke="#555" stroke-width="1.2" />
    </svg>

function initAudio() {
  if (audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();
  droneOsc = audioCtx.createOscillator(); droneGain = audioCtx.createGain();
  droneOsc.type = 'triangle'; droneOsc.frequency.value = 38; droneGain.gain.value = 0.022;
  droneOsc.connect(droneGain).connect(audioCtx.destination); droneOsc.start();
  const bufferSize = 2 * audioCtx.sampleRate;
  const nb = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const nd = nb.getChannelData(0); for (let i=0;i<bufferSize;i++) nd[i]=Math.random()*2-1;
  windNoise = audioCtx.createBufferSource(); windNoise.buffer = nb; windNoise.loop = true;
  windFilter = audioCtx.createBiquadFilter(); windFilter.type='lowpass'; windFilter.frequency.value=160;
  windGain = audioCtx.createGain(); windGain.gain.value=0.010;
  windNoise.connect(windFilter).connect(windGain).connect(audioCtx.destination); windNoise.start();
  setInterval(() => { if (Math.random()>0.6) playChime(); }, 3800);
}
function playChime(freq) {
  if (!audioCtx) return;
  const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
  osc.type='sine'; osc.frequency.value=freq||(660+Math.random()*440);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+1.8);
  osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+1.8);
}
function playXunMelody() {
  if (!audioCtx) return;
  const melody = [{f:293.7,t:0.0,d:0.9},{f:349.2,t:0.55,d:0.8},{f:392.0,t:1.05,d:0.9},{f:440.0,t:1.6,d:0.7},{f:349.2,t:2.1,d:0.6},{f:293.7,t:2.55,d:1.4}];
  const cs = audioCtx.sampleRate*1.5, cb = audioCtx.createBuffer(1,cs,audioCtx.sampleRate), cd=cb.getChannelData(0);
  for(let i=0;i<cs;i++) cd[i]=(Math.random()*2-1)*Math.pow(1-i/cs,3);
  const conv=audioCtx.createConvolver(); conv.buffer=cb;
  const rg=audioCtx.createGain(); rg.gain.value=0.28; conv.connect(rg).connect(audioCtx.destination);
  melody.forEach(({f,t,d})=>{
    const now=audioCtx.currentTime;
    [1,1.02].forEach(ratio=>{
      const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=f*ratio;
      const nb2=audioCtx.createBufferSource(), buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*d),audioCtx.sampleRate), bd=buf.getChannelData(0);
      for(let i=0;i<bd.length;i++) bd[i]=(Math.random()*2-1)*0.018;
      nb2.buffer=buf;
      const nf=audioCtx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=f; nf.Q.value=4;
      nb2.connect(nf).connect(gain);
      gain.gain.setValueAtTime(0,now+t); gain.gain.linearRampToValueAtTime(0.09,now+t+0.08);
      gain.gain.setValueAtTime(0.09,now+t+d-0.15); gain.gain.exponentialRampToValueAtTime(0.001,now+t+d);
      osc.connect(gain); gain.connect(audioCtx.destination); gain.connect(conv);
      osc.start(now+t); osc.stop(now+t+d+0.05); nb2.start(now+t); nb2.stop(now+t+d);

  });
}

// ─────────────────────────────────────
// JADE SVG BUILDER
// ─────────────────────────────────────
function jadeHexSVG(size, inscription, opacity=1) {
  const s = size, half = s/2;
  const pts = [
    [half, s*0.05],[s*0.85, s*0.27],[s*0.85, s*0.73],
    [half, s*0.95],[s*0.15, s*0.73],[s*0.15, s*0.27]
  ].map(p=>p.join(',')).join(' ');
  const inner = [
    [half, s*0.2],[s*0.75, s*0.35],[s*0.75, s*0.65],
    [half, s*0.8],[s*0.25, s*0.65],[s*0.25, s*0.35]
  ].map(p=>p.join(',')).join(' ');
  const fontSize = inscription && inscription.length > 8 ? s*0.09 : s*0.11;
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" fill="none" style="opacity:${opacity}">
    <polygon points="${pts}" stroke="#7a9e7e" stroke-width="${s*0.012}" fill="rgba(122,158,126,0.05)"/>
    <polygon points="${inner}" stroke="#7a9e7e" stroke-width="${s*0.005}" opacity="0.3"/>
    ${inscription ? `<text x="${half}" y="${half+fontSize*0.35}" font-family="Noto Serif SC, serif" font-size="${fontSize}" fill="#7a9e7e" text-anchor="middle" letter-spacing="1">${inscription}</text>` : ''}
  </svg>`;
}

function calcEnding(forcedKey) {
  if (tonyAnswered) return 'thinker';
  if (inventory.pottery && inventory.xun && inventory.jade && inventory.shard) return 'collector';
  if (forcedKey) return forcedKey;
  const scores = { a:state.a, r:state.r+state.i, u:state.u };
  const top = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  if (top[1]===0) return 'passer';
  return {a:'form',r:'order',u:'tool'}[top[0]];
}

function buildRecordCard(name, inscription, endingKey, isLarge) {
  const ending = I18N.endings[endingKey];
  const t = I18N.testimonies;
  const displayName = name || (currentLang==='zh'?'无名旅人':'Anonymous');
  const displayInscription = inscription || displayName;
  const sz = isLarge ? 90 : 48;
  const svgHtml = jadeHexSVG(sz, displayInscription, isLarge ? 1 : 0.7);
  if (isLarge) {
    return `<div class="jade-record-card">
      <div class="jrc-header">${t.cardHeader[currentLang]}</div>
      <div class="jrc-player-name">${displayName}</div>
      <div class="jrc-jade-wrap">${svgHtml}</div>
      <div class="jrc-civ">${ending ? ending.title.en : endingKey}</div>
      <div class="jrc-civ-zh">${ending ? ending.title.zh : ''}</div>
    </div>`;
  } else {
    return `<div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;">
      ${svgHtml}
      <div>
        <div style="font-size:0.8rem;color:#888;letter-spacing:2px;">${displayName}</div>
        <div style="font-size:0.65rem;color:var(--jade);letter-spacing:1px;margin-top:3px;">${ending ? ending.title[currentLang] : endingKey}</div>
      </div>
    </div>`;
  }
}

  neolithicRitual: {
    phase:'neolithic', shape:'spiral', shapeColor:'#7a7a9e',
    text:{en:'Looking at the burial layout as a whole: the arrangement is intentional.<br><br>Pottery at the north. Xun at the head. Jade at the center. Stone tools at the feet. Each object placed with deliberate thought.<br><br>This is a <b>system</b>. The placement of objects in relation to a body is the earliest known form of text in this region.<br><br>The body is the first book. The grave is the first library.',zh:'整体观察墓葬布局：排列是有意为之的。<br><br>陶器在北。埙在头部。玉在中央。石器在足部。每件器物都带着刻意思考而放置。<br><br>这是一个<b>系统</b>。器物相对于遗体的摆放位置，是该地区已知最早的文字形式。<br><br>身体是第一本书。墓葬是第一个图书馆。'},
    choices:[
      {text:{en:'This is already civilization. Bronze merely amplifies it.',zh:'这已经是文明了。青铜时代只是将其放大。'},next:'neolithicBridge',effect:()=>{state.i++;state.r++;},npcs:{bao:{en:'"Civilization is not invented in the Bronze Age. It is systematized there. Who gains, and who loses, in that transition?"',zh:'"文明不是在青铜时代被发明的。它是在那里被系统化的。在那个过渡中，谁得益，谁失去？"'}}},
      {text:{en:'Something is lost in the transition. This intimacy disappears.',zh:'在过渡到青铜的过程中，某些东西消失了。这种亲密性消失了。'},next:'neolithicBridge',effect:()=>{state.e+=2;state.a++;},npcs:{tony:{en:'"What you call \'intimacy\' may be \'illegibility\' to the state. The Bronze Age makes civilization legible — inscribable, tradeable, taxable."',zh:'"你所说的\'亲密性\'，对国家而言可能是\'不可阅读性\'。青铜时代使文明变得可阅读——可铭刻、可交换、可税收。"'}}}
    ]
  },
  neolithicBridge: {
    phase:'neolithic', shape:'ding', shapeColor:'#8c7a3e', oracle:true,
    text:{en:'The Neolithic layer ends here. Above it, the soil changes. Darker, denser, laced with charcoal. Evidence of metallurgical activity — crucible fragments, slag.<br><br>The Bronze Age does not arrive. It erupts.<br><br>In three or four generations, the entire material culture transforms. The intimate burial systems, the painted pottery, the individual xun — replaced by monumental bronzework, inscriptions, vessels too heavy to move.',zh:'新石器时代的地层在这里终止。上面的土壤变了。更暗、更致密，布满木炭。冶金活动的证据——坩埚碎片、炉渣。<br><br>青铜时代不是到来的。它是爆发的。<br><br>在三四代人的时间里，整个物质文化发生了转变。亲密的葬仪系统、彩陶、个人的埙——被宏大的青铜器、铭文、重得无法移动的重器所取代。'},
    choices:[
      {text:{en:'Enter the Bronze Age.',zh:'进入青铜时代。'},next:'bronzeAge',effect:()=>{},npcs:{tony:{en:'"Civilization is not progress. It is re-interpretation. The Bronze Age makes the Neolithic\'s question about meaning heavier."',zh:'"文明不是进步。它是再解释。青铜时代让新石器时代关于意义的问题变得更重。"'},bao:{en:'"Bronze vessels are operational logs of early state. Each vessel records who commanded its production, what ceremony it served."',zh:'"青铜器是早期国家的运营日志。每件器物都记录了谁命令了它的生产、它服务于什么仪式。"'},wong:{en:'"You are about to enter a phase where meaning becomes institutionalized. Ask yourself: who benefits from the institutionalization of meaning?"',zh:'"你即将进入意义被制度化的阶段。问问你自己：谁从意义的制度化中获益？"'}}}
    ]
  },

  bronzeAge: {
    phase:'bronze', shape:'ding', shapeColor:'#7a5c28',
    text:{en:'The Bronze Age has arrived.<br><br>From the pit, three bronze vessels emerge. They are <b>heavier than they should be</b>. Their surfaces are covered in patterns you cannot name. Taotie faces stare from the flanks. Thunder spirals coil between them.<br><br>On the interior of the largest vessel: an inscription, four characters, cast into the bronze. The beginning of governance language.',zh:'青铜时代已经降临。<br><br>坑中，三件青铜重器出土。它们<b>比应有的更重</b>。表面覆满你叫不出名字的纹饰。饕餮面孔从器壁凝视。雷纹螺旋蜷曲其间。<br><br>最大一件器物的内壁：一段铭文，四个字，铸入青铜。治理语言的开端。'},
    choices:[
      {text:{en:'Study the surface patterns — what do these faces mean?',zh:'研究表面纹饰——这些面孔意味着什么？'},next:'formPath',effect:()=>{state.a++;},npcs:{tony:{en:'"Pattern is the pre-language of civilization. The taotie is not decoration. It is a claim about what is sacred and who decides."',zh:'"纹饰是文明的前语言。饕餮不是装饰。它是关于什么是神圣的、以及谁来决定这一切的主张。"'}}},
      {text:{en:'Lift one. Feel what it weighs.',zh:'举起一件。感受它的重量。'},next:'toolPath',effect:()=>{state.u++;},npcs:{wong:{en:'"Weight is a claim. What claim are you accepting when you engage through weight rather than pattern?"',zh:'"重量是一种主张。当你选择通过重量而非纹饰来接触时，你接受了什么主张？"'}}},
      {text:{en:'Read the inscription. Who made this, and why record it?',zh:'阅读铭文。谁制造了这件器物，为何要记录它？'},next:'inscriptionPath',effect:()=>{state.r++;state.i++;},wongChallenge:true,npcs:{bao:{en:'"Inscription is the first form of governance memory. When a ruler casts his name into bronze, he is not recording the past — he is commanding the future."',zh:'"铭文是治理记忆的第一种形式。当统治者将自己的名字铸入青铜，他不是在记录过去——他是在命令未来。"'}}}
    ]
  },
  inscriptionPath: {
    phase:'bronze', shape:'ding', shapeColor:'#8c7a3e',
    text:{en:'The inscription is cast into the bronze — planned before the pour. Four characters: a clan name and an offering statement.<br><br><i>"X clan offers this vessel to ancestor Y, in the year of the tiger."</i><br><br>Three forms of authority in four characters: <b>kinship</b> (clan), <b>lineage</b> (ancestor), <b>time</b> (year). This is not a label. This is a political document.',zh:'铭文是铸入青铜的——在浇铸之前就已经被规划好了。四个字：族名和祭祀陈述。<br><br><i>"X族以此器奉先祖Y，于虎年。"</i><br><br>四个字中有三种权威形式：<b>血缘</b>（族）、<b>世系</b>（先祖）、<b>时间</b>（年）。这不是标签。这是一份政治文件。'},
    choices:[
      {text:{en:'The ruler defines it — inscription is top-down governance.',zh:'统治者定义它——铭文是自上而下的治理。'},next:'ritualPath',effect:()=>{state.r+=2;state.i++;},npcs:{wong:{en:'"What would falsify this model? What would a non-top-down inscription look like?"',zh:'"什么会证伪这个模型？一段非自上而下的铭文会是什么样子？"'},bao:{en:'"Bronze inscriptions are not all royal. The \'ruler defines\' model is itself a governance claim — made by later historians."',zh:'"青铜铭文并非全都是王室的。\'统治者定义\'模型本身就是一种治理主张——由后来的历史学家提出。"'}}},
      {text:{en:'The ritual system defines it — Li precedes the ruler.',zh:'仪式系统定义它——礼先于统治者。'},next:'ritualPath',effect:()=>{state.r++;state.i+=2;},npcs:{tony:{en:'"Civilization begins when humans record themselves interpreting themselves. The inscription is the civilization observing its own structure."',zh:'"当人类记录自己解释自己时，文明就开始了。铭文是文明观察自身结构。"'}}},
      {text:{en:'The craftsman defines it — the maker\'s hand shapes meaning.',zh:'工匠定义它——制造者的手塑造了意义。'},next:'craftPath',effect:()=>{state.u+=2;state.a++;},npcs:{wong:{en:'"Now we have a third model: meaning from below. What evidence would support this?"',zh:'"现在我们有了第三个模型：来自下方的意义。什么证据支持它？"'}}}
    ]
  },
  formPath: {
    phase:'bronze', shape:'ding', shapeColor:'#6a8070',
    text:{en:'You lean close to the largest vessel.<br><br>The taotie mask is not a face — it is a <b>category of terror</b>. Eyes without a body. Power stripped to its most essential visual grammar. Around it: thunder spirals, cloud spirals. Everything is motion arrested mid-coil.',zh:'你靠近最大的那件器物。<br><br>饕餮纹不是一张脸——它是<b>恐惧的一个类别</b>。没有躯体的眼睛。权力被剥离至最基本的视觉语法。其周围：雷纹、云纹。所有事物都是在螺旋正中被凝固的运动。'},
    choices:[
      {text:{en:'Trace the patterns with your fingers.',zh:'用手指描摹这些纹饰。'},next:'deepForm',effect:()=>{state.a++;},hidden:'pottery'},
      {text:{en:'What emotion does this pattern produce in you?',zh:'这些纹饰在你内心唤起了什么情感？'},next:'emotionPath',effect:()=>{state.e++;state.a++;}},
      {text:{en:'The pattern is a system — read it structurally.',zh:'纹饰是一种系统——从结构上解读它。'},next:'formSystem',effect:()=>{state.i++;state.a++;}}
    ]
  },
  deepForm: {
    phase:'bronze', shape:'pottery', shapeColor:'#a67c52',
    text:{en:'Your fingers find the engraving grooves. And then you feel it: <b>a fingerprint</b>, pressed into the clay of the mold before the bronze was poured. Thousands of years old. Still a person.<br><br>The craftsman who made this mold never saw the final bronze. Only their absence remains.',zh:'你的手指触及雕刻的凹槽。然后你感觉到了：一枚<b>指纹</b>，在浇铸青铜之前被压入了陶范。已有数千年历史。仍然是一个人。<br><br>制作这个范的工匠从未看见最终的青铜器。只有他们的缺席留存下来。'},
    choices:[
      {text:{en:'The absence is the civilization.',zh:'缺席即是文明。'},next:'excavation',effect:()=>{state.a++;state.e++;}},
      {text:{en:'Return to the vessel surface.',zh:'回到器物表面。'},next:'formPath',effect:()=>{state.a++;}}
    ]
  },
  emotionPath: {
    phase:'bronze', shape:'jade', shapeColor:'#7a9e7e',
    text:{en:'The pattern produces something you cannot name cleanly. Something like <b>recognition</b> — as if a part of you that predates language knows what this face means. The taotie is not a monster. It is the shape power takes when it wants to be visible.',zh:'这些纹饰唤起了某种你无法清晰命名的东西。更像一种<b>认出</b>——仿佛你身体里某个早于语言的部分知道这张脸的含义。饕餮不是怪物。它是权力想要被看见时所取的形状。'},
    choices:[
      {text:{en:'Sit with this feeling. Do not name it yet.',zh:'与这种感受同坐。还不要为它命名。'},next:'excavation',effect:()=>{state.e+=2;}},
      {text:{en:'Who were the rulers who needed this power visible?',zh:'那些需要这种权力可见的统治者是谁？'},next:'ritualPath',effect:()=>{state.r++;state.i++;}}
    ]
  },
  formSystem: {
    phase:'bronze', shape:'ding', shapeColor:'#7a9e7e',
    text:{en:'The pattern is a <b>grammar</b>. Nothing is random. Nothing is decorative in the sense of merely pleasing — every element <b>does something</b>.<br><br>This is not art. This is a written language, even if we have not decoded all its words.',zh:'纹饰是一种<b>语法</b>。没有什么是随意的。没有什么是仅仅为了悦目而存在的装饰——每个元素都在<b>发挥作用</b>。<br><br>这不是艺术。这是一种书面语言，即便我们还未解码它的所有词语。'},
    choices:[
      {text:{en:'A language no one alive can read — is it still civilization?',zh:'一种没有活人能阅读的语言——它还是文明吗？'},next:'ritualPath',effect:()=>{state.i++;}},
      {text:{en:'The pattern persists. That is enough.',zh:'纹饰持续存在。这已足够。'},next:'excavation',effect:()=>{state.a++;}}
    ]
  },
  toolPath: {
    phase:'bronze', shape:'ding', shapeColor:'#8c7a3e',
    text:{en:'You try to lift the ding. It does not move.<br><br>Not because it is too heavy — but because <b>it was never meant to be lifted</b>. This vessel was cast to be seen in place, by people standing at a distance, in firelight.<br><br><i>We can afford to make something this heavy that does nothing practical.</i><br><br>That sentence IS the Bronze Age.',zh:'你试图举起那口鼎。它没有动。<br><br>不是因为太重——而是因为<b>它从来不是为了被举起而铸造的</b>。这件器物是为了被远处的人在火光中凝视而铸造的。<br><br><i>我们有能力制造如此沉重却毫无实用价值的东西。</i><br><br>那句话就是青铜时代本身。'},
    choices:[
      {text:{en:'Uselessness as power — an honest civilization.',zh:'无用作为权力——一个诚实的文明。'},next:'powerPath',effect:()=>{state.u++;state.r++;}},
      {text:{en:'Find something that was actually used.',zh:'寻找真正被使用过的东西。'},next:'craftPath',effect:()=>{state.u++;},hidden:'xun'},
      {text:{en:'Return to the inscription.',zh:'回到铭文。'},next:'inscriptionPath',effect:()=>{state.i++;},wongChallenge:true}
    ]
  },
  craftPath: {
    phase:'bronze', shape:'pottery', shapeColor:'#a67c52',
    text:{en:'Set apart from the ritual bronzes: a ceramic cup, still holding traces of grain. A bone tool, worn at the tip. A small clay ocarina — <b>six holes</b>, cracked at the rim.<br><br>These things were <i>used</i>. Their surfaces show no taotie, no thunder-spiral grammar — just <b>the smooth patina of use</b>.<br><br>Which is its own kind of civilization.',zh:'在仪式性青铜器旁：一只陶杯，仍留有谷物的痕迹。一件骨器，尖端磨损。一只小陶埙——<b>六孔</b>，口沿开裂。<br><br>这些东西是被<i>使用</i>过的。它们的表面没有饕餮纹，没有雷纹语法——只有<b>使用磨出的光泽</b>。<br><br>那是另一种文明。'},
    choices:[
      {text:{en:'The ordinary is the true record of civilization.',zh:'日常才是文明真正的档案。'},next:'finalQuestion',effect:()=>{state.u+=2;}},
      {text:{en:'But who made the ritual objects? Were they the same hands?',zh:'但是谁制造了那些仪式器物？是同一双手吗？'},next:'ritualPath',effect:()=>{state.i++;}}
    ]
  },
  powerPath: {
    phase:'bronze', shape:'ding', shapeColor:'#8c7a3e',
    text:{en:'The Bronze Age is not about bronze.<br><br>Every bronze vessel is a <b>proof of state</b> — evidence that someone commanded enough people, enough resources, enough time to produce this object.<br><br>The vessel is not a container. <b>The vessel is a threat.</b><br><br>And the threat worked. For a thousand years.',zh:'青铜时代不是关于青铜的。<br><br>每一件青铜器都是<b>国家的证明</b>——证明某人掌控了足够多的人、资源、时间以生产这件器物。<br><br>这件器物不是容器。<b>这件器物是威胁。</b><br><br>这个威胁有效。持续了一千年。'},
    choices:[
      {text:{en:'A civilization built on demonstrated capacity — honest.',zh:'一个建立在展示能力上的文明——诚实的。'},next:'finalQuestion',effect:()=>{state.r+=2;state.i++;}},
      {text:{en:'Threat alone is not civilization. There must be something else.',zh:'单凭威胁不是文明。必定还有别的东西。'},next:'ritualPath',effect:()=>{state.i++;}}
    ]
  },
  ritualPath: {
    phase:'bronze', shape:'jade', shapeColor:'#7a9e7e',
    text:{en:'The vessels are arranged — <b>placed in relationship to each other</b>. A triangle completed by absence: the fourth position is empty, the earth there compressed differently.<br><br>Someone came back. Someone took something away.<br><br>The ritual system (<b>Li 礼</b>) implies: every object\'s placement is specified. The removal of one object violates the system and must be recorded somewhere.',zh:'器物被排列着——<b>被安置在彼此的关系之中</b>。由缺席完成的三角形：第四个位置是空的，那里的土地被压出了不同的形状。<br><br>有人回来过。有人带走了某样东西。<br><br>仪式系统（<b>礼</b>）暗示了这一点：每件器物的摆放位置都被规定。移走一件器物违反了这个系统，必须被记录在某处。'},
    choices:[
      {text:{en:'Seek the hermit who understands the ritual system.',zh:'寻找理解仪式系统的隐士。'},next:'tonyEncounter',effect:()=>{state.r++;state.i++;},npcs:{bao:{en:'"Li (礼) is a gravitational system — everything orbits what has been designated as sacred. You began to be inside it when you noticed the absence."',zh:'"礼是一个引力系统——一切都围绕着被指定为神圣的事物运行。当你注意到那个缺席时，你就开始进入其中了。"'}}},
      {text:{en:'Excavate the empty fourth position.',zh:'发掘空置的第四个位置。'},next:'bronzeShrine',effect:()=>{state.i++;},hidden:'shard',npcs:{tony:{en:'"You are choosing to study the absence rather than seek the explanation. Sometimes the absence is more legible than any text."',zh:'"你选择研究缺席而不是寻求解释。有时缺席比任何文本都更清晰。"'}}},
      {text:{en:'Meditate here. Let the arrangement speak.',zh:'在此冥想。让排列自行言说。'},next:'silentPath',effect:()=>{state.r++;state.e++;}}
    ]
  },
  bronzeShrine: {
    phase:'bronze', shape:'ruin', shapeColor:'#8c9699',
    text:{en:'In the fourth position: a <b>fragment</b>. The handle only, broken at the base. The taotie pattern on it is different — cruder, earlier, perhaps from a different workshop.<br><br>This vessel was not buried with the others. It was <b>removed</b>. Then someone returned and left this fragment as a marker. Of what?<br><br><i>"History is full of deliberate absences."</i>',zh:'第四个位置：一块<b>碎片</b>。只有耳，从底部断裂。上面的饕餮纹与其他器物不同——更粗糙，更早期，或许完全出自不同的作坊。<br><br>这件器物并非与其他器物一同埋下。它是被<b>移走</b>的。后来有人返回，留下这块碎片作为标记。记录什么？<br><br><i>"历史充满了刻意的缺席。"</i>'},
    choices:[
      {text:{en:'The removal matters more than what was removed.',zh:'移走的行为比被移走的东西更重要。'},next:'ritualDeep',effect:()=>{state.i++;}},
      {text:{en:'Seek the hermit. He will know what stood here.',zh:'去找隐士。他会知道这里曾立着什么。'},next:'tonyEncounter',effect:()=>{state.r++;}}
    ]
  },
  ritualDeep: {
    phase:'bronze', shape:'jade', shapeColor:'#7a9e7e',
    text:{en:'Only someone who understands the grammar of the arrangement can read the message of the missing piece.<br><br>Civilization, at its deepest, is a set of things you do not need to explain to those who belong — and cannot explain to those who do not.',zh:'只有理解排列语法的人才能解读缺失部分的含义。<br><br>文明在最深处是：那些不需要向同属者解释、也无法向局外者解释的事物。'},
    choices:[
      {text:{en:'I want to understand the grammar. Find the hermit.',zh:'我想理解这种语法。寻找隐士。'},next:'tonyEncounter',effect:()=>{state.r+=2;state.i++;}},
      {text:{en:'Exclusion built into the foundation — civilization\'s shadow.',zh:'排斥建立在根基中——文明的阴影。'},next:'finalQuestion',effect:()=>{state.i++;}}
    ]
  },
  silentPath: {
    phase:'bronze', shape:'jade', shapeColor:'#7a9e7e',
    text:{en:'You sit among the vessels. The wind moves through the excavation trench.<br><br>Then, slowly, you begin to understand the <b>silence between the objects</b>. The vessels do not speak to each other across the gaps. <i>The gaps are the speech.</i><br><br>Some civilizations communicate through what they refuse to say.',zh:'你坐在器物之间。风穿过发掘沟。<br><br>然后，慢慢地，你开始理解<b>器物之间的沉默</b>。器物们并不跨越间隙彼此言说。<i>间隙本身就是言说。</i><br><br>有些文明通过它们拒绝言说的事物进行交流。'},
    choices:[
      {text:{en:'Stay longer. There is more in the silence.',zh:'再待一会儿。沉默中还有更多。'},next:'tonyEncounter',effect:()=>{state.r+=2;state.e++;}},
      {text:{en:'The silence is enough. I have heard what I needed.',zh:'沉默已经足够。我听到了我需要的。'},next:'finalQuestion',effect:()=>{state.r++;state.e+=2;}}
    ]
  },
  excavation: {
    phase:'bronze', shape:'ruin', shapeColor:'#8c9699', oracle:true,
    text:{en:'Archaeology is the study of <b>what did not decay</b>. The organic material is gone: the cloth, the wood, the food, the music, the words, the faces. What remains is what was hard enough to outlast its context.<br><br>Bronze outlasts. Jade outlasts. Stone outlasts.<br><br>We are building a civilization from its least perishable fragments, and calling it history.',zh:'考古学是对<b>未腐朽之物</b>的研究。有机物已消失：布帛、木材、食物、音乐、语言、面孔。留下来的是足够坚硬、能够比其语境更长久存在的东西。<br><br>青铜历久弥坚。玉历久弥坚。石历久弥坚。<br><br>我们正在从最不易腐朽的碎片中重建一个文明，然后称之为历史。'},
    choices:[
      {text:{en:'What we call civilization is a survivor\'s bias in stone.',zh:'我们所称的文明是石头的幸存者偏差。'},next:'finalQuestion',effect:()=>{state.a++;state.i++;},npcs:{wong:{en:'"Correct — and this is the AOEM problem applied to archaeology itself. Object: stone artifacts. Observation: they survive. What does your model exclude?"',zh:'"正确——这是AOEM问题应用于考古学本身。对象：石制器物。观察：它们存活了下来。你的模型排除了什么？"'}}},
      {text:{en:'Perhaps the perishable things were the heart of it.',zh:'也许那些易腐朽的才是它的核心。'},next:'craftPath',effect:()=>{state.e++;}}
    ]
  },
  tonyEncounter: {
    phase:'bronze', shape:'ruin', shapeColor:'#b8860b',
    text:{en:'At the edge of the excavation site, a man sits on an upturned crate. He is wearing a field jacket that looks thirty years old. He is looking at you as if he expected you eventually.<br><br><b>"You\'ve been reading the surface,"</b> he says. Not a question.<br><br>"There is a word that explains why these vessels weigh more than they should. It is not bronze that makes them heavy."<br><br>He waits.',zh:'在发掘现场的边缘，一个男人坐在一个翻转的木箱上。他穿着一件看起来有三十年历史的田野夹克。他看向你，仿佛早就料到你终究会来。<br><br><b>"你一直在阅读表面，"</b>他说。不是一个问题。<br><br>"有一个字，能解释为什么这些重器比它们应有的更重。使它们沉重的不是青铜。"<br><br>他等待着。'},
    choices:[
      {text:{en:'Ask him to tell you.',zh:'请他告诉你。'},next:'__tony_modal__',effect:()=>{}},

    phase:'bronze', shape:'jade', shapeColor:'#7a9e7e', oracle:true,

    choices:[{text:{en:'Follow the weight to its conclusion.',zh:'追随重量至其终点。'},next:'finalQuestion',effect:()=>{state.r+=2;state.i++;}}]
  },
  tonyWrong: {
    phase:'bronze', shape:'ruin', shapeColor:'#666',
    text:{en:'The man watches you carefully. His expression does not change.<br><br>"The vessels are heavy because of what the people around them <b>agreed</b> they meant. Not the metal. Not the craft. The agreement."<br><br>He sets the stone down gently and does not look at you again.',zh:'那个男人仔细地看着你。他的表情没有变化。<br><br>"重器沉重，是因为环绕它们的人们<b>同意</b>它们意味着什么。不是金属。不是工艺。是那种共识。"<br><br>他轻轻放下石头，不再看你。'},
    choices:[
      {text:{en:'Try again.',zh:'再试一次。'},next:'__tony_modal__',effect:()=>{}},
      {text:{en:'Leave. The word will come later, or not at all.',zh:'离开。那个字会在之后到来，或者永远不会。'},next:'finalQuestion',effect:()=>{}}
    ]
  },
  finalQuestion: {
    phase:'bronze', shape:'jade', shapeColor:'#7a9e7e', oracle:true,
    text:{en:'The sun has moved. The excavation site is quieter now.<br><br>You have passed through two ages of human civilization — from the personal burial of the Neolithic to the institutional apparatus of the Bronze Age.<br><br>You look at the three vessels still in their pit, and you try to formulate what you actually believe about what made these people <b>a civilization</b> rather than simply a population.',zh:'太阳已经移动。发掘现场现在更安静了。<br><br>你穿越了人类文明的两个时代——从新石器时代的个体葬仪，到青铜时代的制度机器。<br><br>你看着仍在坑中的三件器物，你试图说清楚你真正相信是什么使这些人<b>成为了一种文明</b>，而不仅仅是一个族群。'},
    choices:[
      {text:{en:'Civilization is the agreement to make beautiful things together.',zh:'文明是共同制作美丽之物的协议。'},next:'__ending__',endingKey:'form',effect:()=>{state.a+=2;},npcs:{tony:{en:'"You have re-interpreted civilization as aesthetics. But: who gets to participate in the aesthetic agreement?"',zh:'"你将文明再解释为美学。但是：谁有权参与这种美学协议？"'}}},
      {text:{en:'Civilization is structured obligation — ritual that holds people in relation.',zh:'文明是结构性义务——将人们维系在关系之中的礼。'},next:'__ending__',endingKey:'order',effect:()=>{state.r+=2;state.i++;},npcs:{bao:{en:'"This is the classical Chinese answer. But: whose ritual? Every civilization claims its ritual is older than its politics."',zh:'"这是中国古典的答案。但是：谁的礼？每种文明都声称其仪式早于其政治。"'}}},
      {text:{en:'Civilization is accumulated craft knowledge — the wisdom in the hands.',zh:'文明是积累的工艺知识——存在于双手中的智慧。'},next:'__ending__',endingKey:'tool',effect:()=>{state.u+=2;},npcs:{wong:{en:'"What is the relationship between the craft knowledge of the potter and the governance knowledge of the ruler? Are they the same kind of knowledge?"',zh:'"陶工的工艺知识与统治者的治理知识之间是什么关系？它们是同一种知识吗？"'}}}
    ]
  }
};

// ─────────────────────────────────────
// RENDER NODE
// ─────────────────────────────────────
function refreshEl(id, delayMs) {
  const el = document.getElementById(id);
  el.style.transition='none'; el.style.opacity='0'; void el.offsetWidth;
  setTimeout(() => { el.style.transition='opacity 0.9s ease'; el.style.opacity='1'; }, delayMs);
}

function renderNode(nodeKey) {
  window.currentNodeKey = nodeKey;
  if (nodeKey === '__tony_modal__') { showTonyModal(); return; }
  const node = nodes[nodeKey];
  if (!node) { console.error('Missing node:', nodeKey); renderNode('finalQuestion'); return; }
  if (node.phase) setPhase(node.phase);
  if (node.shape) setShape(node.shape, node.shapeColor||'#555');
  document.getElementById('text-area').innerHTML = node.text[currentLang];
  refreshEl('text-area', 300);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = ''; refreshEl('choices', 750);
  (node.choices||[]).forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'btn'; btn.innerHTML = choice.text[currentLang];
    btn.addEventListener('click', () => {
      if (choice.effect) choice.effect();
      const finalNavigate = () => {
        if (choice.next==='__ending__') showEnding(calcEnding(choice.endingKey));
        else renderNode(choice.next);
      };
      let navigate = choice.npcs
        ? () => showObservers(choice.npcs, finalNavigate)
        : finalNavigate;
      // Hidden item discovery
      if (choice.hidden && !inventory[choice.hidden]) {
        inventory[choice.hidden] = true;
        updateInventoryUI(); showHiddenItem(choice.hidden);
        if (choice.hidden === 'jade') {
          const next = navigate;
          navigate = () => setTimeout(() => showBaoModal(next), 1000);
        }
      }
      // Miss Wong challenge
      if (choice.wongChallenge && !playerAnswers.wong) {
        const next = navigate; navigate = () => showWongModal(next);
      }
      navigate();
    });
    choicesEl.appendChild(btn);
  });
  const oracleEl = document.getElementById('oracle');
  if (node.oracle) { oracleEl.textContent = I18N.oracleText[currentLang]; oracleEl.classList.add('visible'); }
  else { oracleEl.classList.remove('visible'); oracleEl.textContent=''; }
  const hiddenEl = document.getElementById('hidden-item');
  hiddenEl.textContent=''; hiddenEl.classList.remove('visible');
}

// ─────────────────────────────────────
// HIDDEN ITEMS
// ─────────────────────────────────────
function showHiddenItem(key) {
  const el = document.getElementById('hidden-item');
  el.textContent = I18N.hidden[key][currentLang]; el.classList.add('visible');
  if (key === 'xun') playXunMelody();
  else { playChime(1100); setTimeout(()=>playChime(1320),300); }
}
function updateInventoryUI() {
  ['pottery','xun','jade','shard'].forEach(key => {
    const el = document.getElementById('inv-'+key);
    if (el) el.classList.toggle('found', !!inventory[key]);
  });
}

// ─────────────────────────────────────
// TONY ZHOU LI MODAL
// ─────────────────────────────────────
function showTonyModal() {
  document.getElementById('tony-header').textContent = I18N.tony.header[currentLang];
  document.getElementById('tony-text').innerHTML = I18N.tony.text[currentLang];
  document.getElementById('tony-input').placeholder = I18N.tony.placeholder[currentLang];
  document.getElementById('tony-submit').textContent = I18N.tony.submit[currentLang];
  document.getElementById('tony-skip').textContent = I18N.tony.skip[currentLang];
  document.getElementById('tony-feedback').textContent=''; document.getElementById('tony-feedback').className='tony-feedback';
  document.getElementById('tony-input').value='';
  document.getElementById('tony-modal').classList.add('show');
  setTimeout(() => document.getElementById('tony-input').focus(), 100);
}
function hideTonyModal() { document.getElementById('tony-modal').classList.remove('show'); }
function checkTonyAnswer() {
  const input = document.getElementById('tony-input').value.trim().toLowerCase();
  const correct = ['li','礼','lǐ','li3','rite','ritual','propriety'];
  const feedback = document.getElementById('tony-feedback');
  if (correct.includes(input) || correct.some(c=>input.includes(c))) {
    feedback.textContent = I18N.tony.correct[currentLang]; feedback.className='tony-feedback correct';
    tonyAnswered=true; playChime(880); setTimeout(()=>playChime(1100),350);
    setTimeout(() => {
      hideTonyModal(); state.r+=2;
      showTonyQuestion(() => renderNode('tonyRight'));
    }, 1800);
  } else {
    feedback.textContent = I18N.tony.wrong[currentLang]; feedback.className='tony-feedback wrong';
    document.getElementById('tony-input').value='';
  }
}

// ─────────────────────────────────────
// NAME SCREEN
// ─────────────────────────────────────
function showNameScreen() {
  const ns = document.getElementById('name-screen');
  document.getElementById('name-prompt').textContent = I18N.namePrompt[currentLang];
  document.getElementById('name-prompt-zh').textContent = I18N.namePromptSub[currentLang];
  document.getElementById('name-submit').textContent = I18N.nameSubmit[currentLang];
  document.getElementById('name-skip').textContent = I18N.nameSkip[currentLang];
  document.getElementById('name-input').placeholder = I18N.namePlaceholder[currentLang];
  document.getElementById('name-input').value = '';
  ns.classList.add('show');
  setTimeout(() => document.getElementById('name-input').focus(), 300);
}
function submitNameAndEnter() {
  const val = document.getElementById('name-input').value.trim();
  playerName = val || '';
  document.getElementById('name-screen').classList.remove('show');
  renderNode('neolithicStart');
}

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
function initGame() {
  // Language
  document.getElementById('lang-switch').addEventListener('click', () => {
    currentLang = currentLang==='en'?'zh':'en';
    document.getElementById('start-hint').textContent = I18N.startHint[currentLang];
    document.getElementById('observer-continue').textContent = I18N.observerContinue[currentLang];
    if (window.currentNodeKey) renderNode(window.currentNodeKey);
  });

  // Start screen → Name screen
  document.getElementById('start-screen').addEventListener('click', () => {
    const ss = document.getElementById('start-screen');
    ss.style.opacity='0';
    setTimeout(() => { ss.style.display='none'; initAudio(); showNameScreen(); }, 1000);
  });

  // Name screen submit
  document.getElementById('name-submit').addEventListener('click', submitNameAndEnter);
  document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') submitNameAndEnter(); });
  document.getElementById('name-skip').addEventListener('click', () => {
    playerName = '';
    document.getElementById('name-screen').classList.remove('show');
    renderNode('neolithicStart');
  });

  // Tony Li puzzle
  document.getElementById('tony-submit').addEventListener('click', checkTonyAnswer);
  document.getElementById('tony-input').addEventListener('keydown', e => { if(e.key==='Enter') checkTonyAnswer(); });
  document.getElementById('tony-skip').addEventListener('click', () => { hideTonyModal(); renderNode('tonyWrong'); });

  // Tony follow-up
  document.getElementById('tq-input').addEventListener('input', () => { document.getElementById('tq-count').textContent=document.getElementById('tq-input').value.length; });
  document.getElementById('tq-submit').addEventListener('click', () => submitTonyQuestion(false));
  document.getElementById('tq-skip').addEventListener('click', () => submitTonyQuestion(true));

  // Miss Wong
  document.getElementById('wm-input').addEventListener('input', () => { document.getElementById('wm-count').textContent=document.getElementById('wm-input').value.length; });
  document.getElementById('wm-submit').addEventListener('click', () => submitWongModal(false));
  document.getElementById('wm-skip').addEventListener('click', () => submitWongModal(true));

  // Bao Yu
  document.getElementById('bm-input').addEventListener('input', () => {
    const val=document.getElementById('bm-input').value;
    document.getElementById('bm-count').textContent=val.length;
    document.getElementById('bao-inscription-text').textContent=val;
    document.getElementById('bao-jade-svg').classList.toggle('jade-glowing', val.length>0);
  });
  document.getElementById('bm-submit').addEventListener('click', () => submitBaoModal(false));
  document.getElementById('bm-skip').addEventListener('click', () => submitBaoModal(true));

  // Observer panel
  document.getElementById('observer-continue').addEventListener('click', () => {
    hideObservers();
    if (pendingNav) { const fn=pendingNav; pendingNav=null; fn(); }
  });

  // Next chapter
  document.getElementById('next-chapter-btn').addEventListener('click', showWarsTeaser);
  document.getElementById('wars-back').addEventListener('click', () => { document.getElementById('wars-teaser').classList.remove('visible'); });

  // Restart
  document.getElementById('restart-btn').addEventListener('click', () => {
    state={u:0,a:0,e:0,i:0,r:0};
    inventory={pottery:false,xun:false,jade:false,shard:false};
    playerAnswers={tony:null,wong:null,bao:null};
    playerName=''; tonyAnswered=false; pendingNav=null;
    baoCallback=null; wongCallback=null; tonyQCallback=null;
    updateInventoryUI();
    document.getElementById('inv-note').style.display='none';
    document.getElementById('ending-screen').classList.remove('show');
    const mg=document.getElementById('main-game'); mg.style.display=''; mg.style.opacity='1'; mg.style.transition='';
    hideObservers(); hideTonyModal(); hideBaoModal(); hideWongModal(); hideTonyQuestion();
    showNameScreen();
  });
}

document.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
