<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order of Jade and Stone | 玉与石的秩序</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --text: #8c9699;
      --jade: #7a9e7e;
      --bronze: #b8860b;
      --clay: #a67c52;
      --highlight: #dcdcdc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Serif SC", "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* Visual effects */
    .overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
    }
    .noise {
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .scanlines {
      background: linear-gradient(to bottom,
        rgba(255,255,255,0), rgba(255,255,255,0) 50%,
        rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px;
    }

    /* Main container */
    #wrap {
      width: 90%;
      max-width: 600px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    /* SVG Stage */
    #stage {
      width: 160px;
      height: 160px;
      margin: 0 auto 30px;
      filter: drop-shadow(0 0 15px rgba(122,158,126,0.3));
      transition: transform 1s ease, filter 1s ease;
    }
    #shape {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawPath 2s forwards ease-in-out;
      transition: stroke 1s ease, d 0.8s ease;
    }
    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    /* Text area */
    #text-area {
      min-height: 120px;
      margin-bottom: 20px;
      line-height: 1.9;
      font-size: 1.05rem;
      opacity: 0;
    }
    #text-area b {
      color: var(--highlight);
      font-weight: normal;
      border-bottom: 1px solid var(--jade);
    }
    #text-area i { color: var(--clay); }

    /* Buttons */
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
    }
    .btn {
      padding: 12px 16px;
      border: 1px solid #222;
      cursor: pointer;
      transition: all 0.4s;
      background: rgba(0,0,0,0.5);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      border-color: var(--jade);
      color: var(--jade);
      padding-left: 20px;
      background: rgba(122,158,126,0.05);
    }
    .btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: var(--jade);
      transition: 0.3s;
    }
    .btn:hover::before { width: 3px; }

    /* Hidden item toast */
    .hidden-item {
      font-size: 0.82rem;
      color: var(--clay);
      margin: 15px 0;
      opacity: 0;
      transition: opacity 0.8s;
      letter-spacing: 1px;
    }
    .hidden-item.visible { opacity: 1; }

    /* Oracle */
    .oracle {
      font-size: 0.8rem;
      color: var(--jade);
      margin-top: 30px;
      opacity: 0;
      letter-spacing: 2px;
      transition: opacity 1.5s;
    }
    .oracle.visible { opacity: 0.7; }

    /* Start screen */
    #start-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 100;
      transition: opacity 1s;
    }
    #start-screen h1 {
      font-weight: 300;
      letter-spacing: 6px;
      margin-bottom: 10px;
      font-size: 1.4rem;
      color: var(--highlight);
    }
    #start-screen .sub {
      opacity: 0.4;
      font-size: 0.85rem;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #start-screen p {
      opacity: 0.4;
      font-size: 0.8rem;
      animation: pulse 2s infinite;
      letter-spacing: 3px;
      margin-top: 30px;
    }

    /* Language switch */
    #lang-switch {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 20;
      cursor: pointer;
      font-size: 0.75rem;
      border: 1px solid #333;
      padding: 5px 10px;
      opacity: 0.4;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    #lang-switch:hover { opacity: 1; border-color: var(--jade); }

    /* Inventory */
    .inventory {
      position: fixed;
      bottom: 20px; left: 20px;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .inv-item {
      width: 26px; height: 26px;
      opacity: 0.15;
      transition: opacity 0.5s, filter 0.5s;
    }
    .inv-item.found {
      opacity: 1;
      filter: drop-shadow(0 0 6px var(--clay));
    }
    .inv-label {
      font-size: 0.65rem;
      color: var(--clay);
      opacity: 0;
      letter-spacing: 1px;
      position: fixed;
      bottom: 50px; left: 20px;
      transition: opacity 0.5s;
    }
    .inv-label.visible { opacity: 0.6; }

    /* Ending screen */
    #ending-screen {
      display: none;
      text-align: center;
      animation: fadeIn 2s forwards;
    }
    #ending-screen.show { display: block; }
    .ending-title {
      font-size: 1.4rem;
      color: var(--highlight);
      letter-spacing: 4px;
      margin-bottom: 10px;
      font-weight: 300;
    }
    .ending-zh {
      font-size: 1.8rem;
      color: var(--jade);
      letter-spacing: 8px;
      margin-bottom: 20px;
    }
    .ending-desc {
      font-size: 0.9rem;
      line-height: 1.8;
      opacity: 0.7;
      margin-bottom: 30px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .ending-oracle {
      font-size: 0.75rem;
      color: var(--jade);
      letter-spacing: 2px;
      opacity: 0.6;
      margin-bottom: 30px;
      font-style: italic;
    }
    .score-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 30px;
      font-size: 0.72rem;
      letter-spacing: 1px;
      opacity: 0.5;
    }
    .score-item { text-align: center; }
    .score-bar {
      width: 40px; height: 3px;
      background: #222;
      margin: 4px auto 0;
      position: relative;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: var(--jade);
      transition: width 1.5s ease;
    }

    /* Tony Zhou Modal */
    .tony-modal {
      position: fixed;
      top: 15%; left: 50%;
      transform: translateX(-50%);
      background: rgba(4, 4, 4, 0.96);
      border: 1px solid var(--bronze);
      padding: 28px;
      border-radius: 2px;
      z-index: 200;
      max-width: 500px;
      width: 88%;
      font-size: 0.9rem;
      color: #ccc;
      box-shadow: 0 0 30px rgba(184,134,11,0.2);
      display: none;
    }
    .tony-modal.show { display: block; animation: fadeIn 0.5s forwards; }
    .tony-modal-header {
      color: var(--bronze);
      font-size: 0.78rem;
      letter-spacing: 2px;
      margin-bottom: 16px;
      font-style: italic;
    }
    .tony-modal p { line-height: 1.9; margin-bottom: 12px; }
    .tony-modal b { color: var(--highlight); font-weight: normal; border-bottom: 1px solid var(--bronze); }
    .tony-modal i { color: var(--clay); }
    .input-area {
      margin-top: 18px;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      padding: 8px 12px;
      background: #111;
      border: 1px solid var(--jade);
      color: var(--highlight);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .input-area input:focus { border-color: var(--bronze); }
    .input-area button {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--jade);
      color: var(--jade);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .input-area button:hover { background: rgba(122,158,126,0.15); }
    .tony-skip {
      font-size: 0.72rem;
      color: #444;
      cursor: pointer;
      margin-top: 12px;
      display: block;
      text-align: right;
      transition: color 0.3s;
    }
    .tony-skip:hover { color: #666; }
    .tony-feedback {
      margin-top: 10px;
      font-size: 0.8rem;
      min-height: 18px;
      transition: color 0.3s;
    }
    .tony-feedback.correct { color: var(--jade); }
    .tony-feedback.wrong { color: #8b3a3a; }

    /* Restart button */
    .restart-btn {
      padding: 10px 24px;
      border: 1px solid #333;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.4s;
    }
    .restart-btn:hover { border-color: var(--jade); color: var(--jade); }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.6; }
    }
    @keyframes shimmer {
      0%,100% { filter: drop-shadow(0 0 8px rgba(122,158,126,0.2)); }
      50% { filter: drop-shadow(0 0 20px rgba(122,158,126,0.5)); }
    }
    .stage-shimmer { animation: shimmer 3s infinite; }
  </style>
</head>
<body>

<!-- Visual effects -->
<div class="overlay noise"></div>
<div class="overlay scanlines"></div>

<!-- Language toggle -->
<div id="lang-switch">EN / 中文</div>

<!-- Start screen -->
<div id="start-screen">
  <h1>ORDER OF JADE &amp; STONE</h1>
  <div class="sub">玉与石的秩序</div>
  <p id="start-hint">CLICK TO ENTER THE RUINS</p>
</div>

<!-- Main container -->
<div id="wrap">
  <div id="main-game">
    <svg id="stage" viewBox="0 0 100 100">
      <path id="shape" d="" fill="none" stroke="#555" stroke-width="1.2" />
    </svg>
    <div id="text-area"></div>
    <div id="hidden-item" class="hidden-item"></div>
    <div id="choices" class="btn-container"></div>
    <div id="oracle" class="oracle"></div>
  </div>

  <div id="ending-screen">
    <div class="ending-title" id="ending-title"></div>
    <div class="ending-zh" id="ending-zh"></div>
    <div class="ending-desc" id="ending-desc"></div>
    <div class="ending-oracle" id="ending-oracle"></div>
    <div class="score-row" id="score-row"></div>
    <div id="inv-note" style="font-size:0.72rem;color:var(--clay);opacity:0.6;margin-bottom:20px;letter-spacing:1px;display:none;"></div>
    <button class="restart-btn" id="restart-btn"></button>
  </div>
</div>

<!-- Inventory icons -->
<div class="inventory">
  <!-- Pottery -->
  <svg id="inv-pottery" class="inv-item" viewBox="0 0 24 24" fill="none">
    <path d="M8 4h8l1 3H7L8 4z" stroke="var(--clay)" stroke-width="1.2"/>
    <path d="M7 7c-.5 2-.5 8 0 10h10c.5-2 .5-8 0-10" stroke="var(--clay)" stroke-width="1.2"/>
    <path d="M9 17q3 2 6 0" stroke="var(--clay)" stroke-width="1.2"/>
    <path d="M10 10q2 2 4 0" stroke="var(--clay)" stroke-width="0.8"/>
  </svg>
  <!-- Xun (ocarina) -->
  <svg id="inv-xun" class="inv-item" viewBox="0 0 24 24" fill="none">
    <ellipse cx="12" cy="13" rx="8" ry="7" stroke="var(--clay)" stroke-width="1.2"/>
    <circle cx="9.5" cy="11.5" r="1.2" fill="var(--clay)"/>
    <circle cx="12" cy="9.5" r="1.2" fill="var(--clay)"/>
    <circle cx="14.5" cy="11.5" r="1.2" fill="var(--clay)"/>
    <circle cx="12" cy="14" r="1.2" fill="var(--clay)"/>
    <path d="M12 6 Q14 4 16 5" stroke="var(--clay)" stroke-width="0.8"/>
  </svg>
  <!-- Bronze shard -->
  <svg id="inv-shard" class="inv-item" viewBox="0 0 24 24" fill="none">
    <path d="M12 3 L4 10 L7 14 L3 21 L13 17 L20 20 L17 12 L21 8 Z" stroke="var(--bronze)" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M12 3 L13 9 L17 12" stroke="var(--bronze)" stroke-width="0.6"/>
    <path d="M7 14 L13 17" stroke="var(--bronze)" stroke-width="0.6"/>
  </svg>
</div>

<!-- Tony Zhou Modal -->
<div id="tony-modal" class="tony-modal">
  <div class="tony-modal-header" id="tony-header"></div>
  <p id="tony-text"></p>
  <div class="input-area">
    <input type="text" id="tony-input" autocomplete="off" spellcheck="false" />
    <button id="tony-submit"></button>
  </div>
  <div class="tony-feedback" id="tony-feedback"></div>
  <span class="tony-skip" id="tony-skip"></span>
</div>

<script>
// ─────────────────────────────────────
// STATE
// ─────────────────────────────────────
let currentLang = 'en';
let tonyAnswered = false;

let state = { u: 0, a: 0, e: 0, i: 0 }; // utility, aesthetic, emotion, intellect
let inventory = { pottery: false, xun: false, shard: false };

let audioCtx, droneOsc, droneGain, windNoise, windFilter, windGain;

// ─────────────────────────────────────
// I18N
// ─────────────────────────────────────
const I18N = {
  startHint: { en: 'CLICK TO ENTER THE RUINS', zh: '点击进入遗迹' },
  oracleText: {
    en: '"Civilization is not an end, but a divergence of interpretation."',
    zh: '"文明不是结束，是解释方式的分裂。"'
  },
  hidden: {
    pottery: {
      en: '◈  You found a fragment of ancient pottery. The clay still holds the warmth of fingers.',
      zh: '◈  你发现了一片古陶。陶土上仍留有手的温度。'
    },
    xun: {
      en: '◈  You uncovered an ocarina (Xun). Six holes, waiting for breath to awaken sound.',
      zh: '◈  你发现了一只埙。六孔，等待气息唤醒声音。'
    },
    shard: {
      en: '◈  [Hidden] A fragment of ritual bronze. It hums faintly with ancient order.',
      zh: '◈  [隐藏] 礼器残片。它因古老的秩序而低鸣。'
    }
  },
  tony: {
    header: { en: '【 Hermit — Tony Zhou 】', zh: '【 隐士 — Tony Zhou 】' },
    text: {
      en: 'The bronze vessels are <b>heavy</b>. They are not made for use — they are made for <b>Li</b>.<br><br>Every pattern on their surface is a word. Every silence between the cauldrons\' thunder is a sentence.<br><br><i>Enter the ancient concept that separates civilization from mere survival:</i>',
      zh: '青铜器很<b>重</b>。它们不是为了使用而铸造——它们是为了<b>礼</b>而铸造。<br><br>器物表面的每一个纹饰都是一个字。鼎沸雷霆之间的每一段寂静都是一句话。<br><br><i>输入那个将文明与单纯生存分开的古代概念：</i>'
    },
    placeholder: { en: 'Enter the word...', zh: '输入那个字……' },
    submit: { en: 'Offer', zh: '奉上' },
    skip: { en: 'I do not know this word. Let me pass.', zh: '我不知道这个字。让我离开。' },
    correct: { en: '— The vessels grow still. You have spoken the truth.', zh: '— 重器归于平静。你说出了真相。' },
    wrong: { en: '— The bronze does not recognize that word.', zh: '— 青铜不认识这个字。' }
  },
  endings: {
    form: {
      title: { en: 'Object-Watching Civilization', zh: '观物文明' },
      desc: {
        en: 'You dwelt longest among forms. The world, for you, is primarily surface — not shallow surface, but the kind that contains depth. You believe civilization reveals itself not in laws or tools, but in the patient act of seeing.',
        zh: '你在形式中停留最久。对你而言，世界首先是表面——不是浅薄的表面，而是那种蕴含深度的表面。你相信文明不通过法律或工具显现，而通过耐心的观看显现。'
      }
    },
    order: {
      title: { en: 'Order Civilization', zh: '秩序文明' },
      desc: {
        en: 'You followed the structure beneath the surface. The world, for you, is primarily pattern — the invisible lattice that holds things in place. You believe civilization is order made visible, rule made weight.',
        zh: '你追随表面之下的结构。对你而言，世界首先是秩序——那个将事物固定在位置上的无形格架。你相信文明是使秩序可见，使规则有重量。'
      }
    },
    tool: {
      title: { en: 'Artisan Civilization', zh: '工匠文明' },
      desc: {
        en: 'You respected what was made by hand. The world, for you, is primarily craft — the knowledge that lives in muscle and fingertip. You believe civilization is the accumulated wisdom of makers.',
        zh: '你尊重手工制造之物。对你而言，世界首先是工艺——存活在肌肉和指尖中的知识。你相信文明是制造者积累的智慧。'
      }
    },
    collector: {
      title: { en: 'The Collector', zh: '收藏家' },
      desc: {
        en: 'You gathered what others passed by. The pottery, the ocarina, the bronze shard — each one a thread in a larger tapestry. You believe preservation is itself a form of civilization.',
        zh: '你拾取了他人略过之物。古陶、埙、青铜碎片——每一件都是更大挂毯中的一根线。你相信保存本身就是文明的一种形式。'
      }
    },
    thinker: {
      title: { en: 'The Thinker', zh: '思考者' },
      desc: {
        en: 'You heard what the hermit said and understood it. Li — ritual, propriety, the invisible architecture of relation. You did not just witness civilization. You understood its grammar.',
        zh: '你听到了隐士所说的话，并理解了它。礼——仪式、礼节、关系的无形结构。你不只是见证了文明，你理解了它的语法。'
      }
    },
    passer: {
      title: { en: 'The Passerby', zh: '过客' },
      desc: {
        en: 'You moved through history without leaving a mark — and without one being left on you. Not every encounter with the past changes us. Sometimes we simply pass through, and the ruins close behind us like water.',
        zh: '你走过历史，既未留下痕迹，也未被留下痕迹。并非每一次与过去的相遇都会改变我们。有时我们只是路过，废墟像水一样在身后合拢。'
      }
    }
  },
  restart: { en: '↻  BEGIN AGAIN', zh: '↻  重新开始' }
};

// ─────────────────────────────────────
// SVG SHAPES
// ─────────────────────────────────────
const SHAPES = {
  pottery: "M30,80 Q20,60 25,40 Q30,20 50,15 Q70,20 75,40 Q80,60 70,80 Q60,86 50,86 Q40,86 30,80 Z",
  xun:     "M20,45 Q18,30 25,22 Q35,14 50,14 Q65,14 75,22 Q82,30 80,45 Q80,60 70,72 Q60,80 50,80 Q40,80 30,72 Q20,60 20,45 Z",
  ding:    "M30,72 L28,50 L22,42 L78,42 L72,50 L70,72 Z M35,72 L35,80 M65,72 L65,80 M22,42 L22,38 L25,34 L75,34 L78,38 L78,42",
  jade:    "M50,10 L72,28 L72,62 L50,80 L28,62 L28,28 Z",
  ruin:    "M15,80 L15,50 L25,50 L25,40 L35,40 L35,50 L45,50 L45,30 L55,30 L55,50 L65,50 L65,45 L75,45 L75,80 Z"
};

function setShape(key, color = '#666') {
  const el = document.getElementById('shape');
  el.setAttribute('d', SHAPES[key] || SHAPES.pottery);
  el.setAttribute('stroke', color);
  el.style.strokeDashoffset = '500';
  // re-trigger animation
  el.style.animation = 'none';
  requestAnimationFrame(() => {
    el.style.animation = 'drawPath 2s forwards ease-in-out';
  });
}

// ─────────────────────────────────────
// AUDIO
// ─────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();

  droneOsc = audioCtx.createOscillator();
  droneGain = audioCtx.createGain();
  droneOsc.type = 'triangle';
  droneOsc.frequency.value = 38;
  droneGain.gain.value = 0.022;
  droneOsc.connect(droneGain).connect(audioCtx.destination);
  droneOsc.start();

  const bufferSize = 2 * audioCtx.sampleRate;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const out = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) out[i] = Math.random() * 2 - 1;
  windNoise = audioCtx.createBufferSource();
  windNoise.buffer = noiseBuffer;
  windNoise.loop = true;
  windFilter = audioCtx.createBiquadFilter();
  windFilter.type = 'lowpass';
  windFilter.frequency.value = 160;
  windGain = audioCtx.createGain();
  windGain.gain.value = 0.010;
  windNoise.connect(windFilter).connect(windGain).connect(audioCtx.destination);
  windNoise.start();

  setInterval(() => { if (Math.random() > 0.6) playChime(); }, 3800);
}

function playChime(freq) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq || (660 + Math.random() * 440);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);

  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 1.8);
}

    },

  },

    shape: 'ruin',
    shapeColor: '#666',
    text: {

      zh: '那个男人仔细地看着你。他的表情没有变化。<br><br>"你接近了，"他说。"或者也许你根本没有接近。从一个字的外部很难判断。"<br><br>他从地上捡起一块小石头，用两根手指夹起来举起。<br><br>"重器沉重，是因为环绕它们的人们同意它们意味着什么。不是金属。不是工艺。是<b>那种共识</b>。"<br><br>他轻轻放下石头，不再看你。'
    },
    choices: [
      {
        text: { en: 'Try again — you almost had it.', zh: '再试一次——你几乎到了。' },

      {
        text: { en: 'Leave. The word will come later, or not at all.', zh: '离开。那个字会在之后到来，或者永远不会。' },

    shape: 'jade',
    shapeColor: '#7a9e7e',

    text: {

      zh: '太阳已经移动了位置。<br><br>你在这里待的时间比计划的更久。发掘现场现在更安静了——其他研究人员已经离开了，唯一的声音是风声，以及偶尔传来的、你无法辨认来源的遥远金属声。<br><br>你看着仍在坑中的三件器物，仍保持着它们古老的关系排列，你试图说清楚你真正相信是什么使这些人<b>成为了一种文明</b>，而不仅仅是一个族群。'
    },
    choices: [
      {
        text: { en: 'Civilization is the agreement to make beautiful things together.', zh: '文明是共同制作美丽之物的协议。' },

        endingKey: 'form',
        effect: () => { state.a += 2; }
      },
      {

// ─────────────────────────────────────
// ENDING CALCULATION
// ─────────────────────────────────────
function calcEnding(forcedKey) {
  // Achievements always override explicit choice
  if (tonyAnswered) return 'thinker';
  if (inventory.pottery && inventory.xun && inventory.shard) return 'collector';
  // Explicit choice from finalQuestion
  if (forcedKey) return forcedKey;
  // Score-based fallback
  const scores = { a: state.a, i: state.i, u: state.u };
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
  if (top[1] === 0) return 'passer';
  return { a: 'form', i: 'order', u: 'tool' }[top[0]];
}

function showEnding(key) {
  const ending = I18N.endings[key];
  const mainGame = document.getElementById('main-game');
  const endScreen = document.getElementById('ending-screen');

  mainGame.style.opacity = '0';
  mainGame.style.transition = 'opacity 1.5s';

  setTimeout(() => {
    mainGame.style.display = 'none';
    endScreen.classList.add('show');

    document.getElementById('ending-title').textContent = ending.title[currentLang];
    document.getElementById('ending-zh').textContent = ending.title.zh;
    document.getElementById('ending-desc').textContent = ending.desc[currentLang];
    document.getElementById('ending-oracle').textContent = I18N.oracleText[currentLang];

    // Score bars
    const maxScore = Math.max(state.a, state.i, state.u, state.e, 1);
    const scoreRow = document.getElementById('score-row');
    const labels = {
      a: { en: 'FORM', zh: '形' },
      i: { en: 'ORDER', zh: '礼' },
      u: { en: 'CRAFT', zh: '工' },
      e: { en: 'FEELING', zh: '情' }
    };
    scoreRow.innerHTML = Object.entries(labels).map(([k, label]) => `
      <div class="score-item">
        <div>${label[currentLang]}</div>
        <div class="score-bar">
          <div class="score-fill" style="width:${Math.round((state[k] / maxScore) * 100)}%"></div>
        </div>
      </div>
    `).join('');

    document.getElementById('restart-btn').textContent = I18N.restart[currentLang];

    // Inventory summary
    const found = Object.values(inventory).filter(Boolean).length;
    const invNote = document.getElementById('inv-note');
    if (found > 0) {
      invNote.textContent = currentLang === 'en' ? `Objects found: ${found}/3` : `发现器物：${found}/3`;
      invNote.style.display = 'block';
    } else {
      invNote.style.display = 'none';
    }

    playChime(440);
    setTimeout(() => playChime(550), 400);
    setTimeout(() => playChime(660), 800);
  }, 1500);
}

// ─────────────────────────────────────
// RENDER NODE
// ─────────────────────────────────────
function refreshEl(id, delayMs) {
  const el = document.getElementById(id);
  el.style.transition = 'none';
  el.style.opacity = '0';
  void el.offsetWidth;
  setTimeout(() => {
    el.style.transition = 'opacity 0.9s ease';
    el.style.opacity = '1';
  }, delayMs);
}

function renderNode(nodeKey) {
  window.currentNodeKey = nodeKey;

  // Handle special meta-nodes
  if (nodeKey === '__tony_modal__') {
    showTonyModal();
    return;
  }

  const node = nodes[nodeKey];
  if (!node) {
    console.error('Missing node:', nodeKey);
    return;
  }

  // Shape
  if (node.shape) setShape(node.shape, node.shapeColor || '#666');

  // Text
  const textArea = document.getElementById('text-area');
  textArea.innerHTML = node.text[currentLang];
  refreshEl('text-area', 300);

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  refreshEl('choices', 750);

  (node.choices || []).forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerHTML = choice.text[currentLang];
    btn.addEventListener('click', () => {
      if (choice.effect) choice.effect();

      // Reveal hidden item
      if (choice.hidden && !inventory[choice.hidden]) {
        inventory[choice.hidden] = true;
        showHiddenItem(choice.hidden);
        updateInventoryUI();
      }

      // Navigate
      if (choice.next === '__ending__') {
        showEnding(calcEnding(choice.endingKey));
      } else {
        renderNode(choice.next);
      }
    });
    choicesEl.appendChild(btn);
  });

  // Oracle
  const oracleEl = document.getElementById('oracle');
  if (node.oracle) {
    oracleEl.textContent = I18N.oracleText[currentLang];
    oracleEl.classList.add('visible');
  } else {
    oracleEl.classList.remove('visible');
    oracleEl.textContent = '';
  }

  // Clear hidden item
  const hiddenEl = document.getElementById('hidden-item');
  hiddenEl.textContent = '';
  hiddenEl.classList.remove('visible');
}

// ─────────────────────────────────────
// HIDDEN ITEMS
// ─────────────────────────────────────
function showHiddenItem(key) {
  const el = document.getElementById('hidden-item');
  el.textContent = I18N.hidden[key][currentLang];
  el.classList.add('visible');
  playChime(1100);
  setTimeout(() => playChime(1320), 300);
}

function updateInventoryUI() {
  ['pottery', 'xun', 'shard'].forEach(key => {
    const el = document.getElementById('inv-' + key);
    if (inventory[key]) el.classList.add('found');
  });
}

// ─────────────────────────────────────
// TONY ZHOU MODAL
// ─────────────────────────────────────
function showTonyModal() {
  const modal = document.getElementById('tony-modal');
  document.getElementById('tony-header').textContent = I18N.tony.header[currentLang];
  document.getElementById('tony-text').innerHTML = I18N.tony.text[currentLang];
  document.getElementById('tony-input').placeholder = I18N.tony.placeholder[currentLang];
  document.getElementById('tony-submit').textContent = I18N.tony.submit[currentLang];
  document.getElementById('tony-skip').textContent = I18N.tony.skip[currentLang];
  document.getElementById('tony-feedback').textContent = '';
  document.getElementById('tony-feedback').className = 'tony-feedback';
  document.getElementById('tony-input').value = '';
  modal.classList.add('show');
  setTimeout(() => document.getElementById('tony-input').focus(), 100);
}

function hideTonyModal() {
  document.getElementById('tony-modal').classList.remove('show');
}

function checkTonyAnswer() {
  const input = document.getElementById('tony-input').value.trim().toLowerCase();
  const correct = ['li', '礼', 'lǐ', 'li3', 'rite', 'ritual', 'propriety'];
  const feedback = document.getElementById('tony-feedback');

  if (correct.includes(input) || correct.some(c => input.includes(c))) {
    feedback.textContent = I18N.tony.correct[currentLang];
    feedback.className = 'tony-feedback correct';
    tonyAnswered = true;
    playChime(880);
    setTimeout(() => playChime(1100), 350);
    setTimeout(() => {
      hideTonyModal();
      state.i += 2;
      renderNode('tonyRight');
    }, 1800);
  } else {
    feedback.textContent = I18N.tony.wrong[currentLang];
    feedback.className = 'tony-feedback wrong';
    document.getElementById('tony-input').value = '';
  }
}

// ─────────────────────────────────────
// INIT GAME
// ─────────────────────────────────────
function initGame() {
  // Language switch
  document.getElementById('lang-switch').addEventListener('click', () => {
    currentLang = currentLang === 'en' ? 'zh' : 'en';
    document.getElementById('start-hint').textContent = I18N.startHint[currentLang];
    if (window.currentNodeKey) renderNode(window.currentNodeKey);
  });

  // Start screen
  document.getElementById('start-screen').addEventListener('click', () => {
    const ss = document.getElementById('start-screen');
    ss.style.opacity = '0';
    setTimeout(() => { ss.style.display = 'none'; }, 1000);
    initAudio();
    renderNode('bronzeAge');
  });

  // Tony modal — submit
  document.getElementById('tony-submit').addEventListener('click', checkTonyAnswer);
  document.getElementById('tony-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkTonyAnswer();
  });

  // Tony modal — skip
  document.getElementById('tony-skip').addEventListener('click', () => {
    hideTonyModal();
    renderNode('tonyWrong');
  });

  // Restart
  document.getElementById('restart-btn').addEventListener('click', () => {
    state = { u: 0, a: 0, e: 0, i: 0 };
    inventory = { pottery: false, xun: false, shard: false };
    tonyAnswered = false;
    updateInventoryUI();
    ['pottery','xun','shard'].forEach(k => {
      document.getElementById('inv-'+k).classList.remove('found');
    });

    const endScreen = document.getElementById('ending-screen');
    const mainGame = document.getElementById('main-game');
    endScreen.classList.remove('show');
    document.getElementById('inv-note').style.display = 'none';
    mainGame.style.display = '';
    mainGame.style.opacity = '1';
    mainGame.style.transition = '';
    renderNode('bronzeAge');
  });
}

document.addEventListener('DOMContentLoaded', initGame);
</script>
